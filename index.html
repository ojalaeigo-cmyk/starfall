<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Star King MAIN FINAL</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#071018">
<style>
*{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}
html,body{width:100%;height:100%;overflow:hidden;background:#071018;font-family:Arial,sans-serif}
#wrap{position:fixed;inset:0;display:flex;justify-content:center;align-items:center;background:radial-gradient(circle at top,#244869,#071018 72%)}
canvas{width:100vw;height:100vh;max-width:520px;background:#102033;touch-action:none}
#hud{position:fixed;top:10px;left:50%;transform:translateX(-50%);width:min(94vw,500px);display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;color:#fff;font-weight:bold;font-size:13px;text-align:center;text-shadow:0 2px 3px #000;z-index:5;pointer-events:none}
.box{background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.18);border-radius:14px;padding:7px}
#info{position:fixed;top:82px;left:50%;transform:translateX(-50%);width:min(92vw,480px);color:white;text-align:center;z-index:5;font-weight:bold;text-shadow:0 2px 3px #000;pointer-events:none}
.bar{height:8px;background:rgba(255,255,255,.18);border-radius:99px;overflow:hidden;margin-top:6px}.bar>div{height:100%;width:0;background:linear-gradient(90deg,#8fd7ff,#ffd966)}
#pauseBtn{position:fixed;top:124px;right:calc(50% - min(47vw,250px));z-index:8;display:none;border:1px solid rgba(255,255,255,.24);background:rgba(0,0,0,.52);color:white;border-radius:999px;padding:8px 11px;font-size:16px;font-weight:bold}
.screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.84);z-index:20;color:white;text-align:center;padding:22px}
.panel{width:min(92vw,480px);max-height:90vh;overflow:auto;background:linear-gradient(180deg,rgba(255,255,255,.14),rgba(255,255,255,.07));border:1px solid rgba(255,255,255,.22);border-radius:26px;padding:24px 18px;box-shadow:0 22px 60px rgba(0,0,0,.45)}
h1{font-size:38px;color:#ffd966;margin-bottom:10px}.panel p{font-size:14px;line-height:1.35;margin-bottom:9px}.legend{display:grid;gap:6px;text-align:left;margin:10px 0}.legend div{background:rgba(0,0,0,.28);border:1px solid rgba(255,255,255,.13);border-radius:13px;padding:7px 9px;font-size:13px}
select,input{width:100%;border:1px solid rgba(255,255,255,.25);border-radius:15px;padding:12px;background:rgba(255,255,255,.93);font-size:16px;margin:5px 0 10px;text-align:center}
button{border:0;border-radius:999px;padding:15px 28px;font-size:18px;font-weight:bold;background:white;color:#111;cursor:pointer;margin-top:4px}
.hidden{display:none!important}.visible{display:block!important}.yellow{color:#ffd966}.green{color:#8cffb1}.pink{color:#ffb3d9}.small{font-size:12px!important;opacity:.78!important}
</style>
</head>
<body>
<div id="wrap"><canvas id="game"></canvas></div>
<div id="hud">
<div class="box"><span id="scoreLabel">Score</span><br><span id="score" class="yellow">0</span></div>
<div class="box"><span id="livesLabel">Lives</span><br><span id="lives" class="pink">3</span></div>
<div class="box"><span id="shieldLabel">Shield</span><br><span id="shieldText" class="green">100</span></div>
</div>
<div id="info"><div id="levelLine">Level 1 / 30</div><div class="bar"><div id="prog"></div></div></div>
<button id="pauseBtn">⏸</button>

<div id="start" class="screen"><div class="panel">
<h1 id="startTitle">Star King</h1>
<label id="chooseLabel" class="small">Choose language</label>
<select id="langSelect"><option value="en">English</option>
<option value="bg">Bulgaaria / Български</option>
<option value="hr">Hrvatski</option>
<option value="cs">Čeština</option>
<option value="da">Dansk</option>
<option value="nl">Nederlands</option>
<option value="et">Eesti</option>
<option value="fi">Suomi</option>
<option value="fr">Français</option>
<option value="de">Deutsch</option>
<option value="el">Ελληνικά</option>
<option value="hu">Magyar</option>
<option value="ga">Gaeilge</option>
<option value="it">Italiano</option>
<option value="lv">Latviešu</option>
<option value="lt">Lietuvių</option>
<option value="mt">Malti</option>
<option value="pl">Polski</option>
<option value="pt">Português</option>
<option value="ro">Română</option>
<option value="sk">Slovenčina</option>
<option value="sl">Slovenščina</option>
<option value="es">Español</option>
<option value="sv">Svenska</option>
<option value="uk">Українська</option></select>
<p id="intro"></p>
<div class="legend">
<div id="rule1"></div><div id="rule2"></div><div id="rule3"></div><div id="rule4"></div><div id="rule5"></div>
</div>
<input id="playerName" maxlength="18" autocomplete="nickname">
<p id="marker" class="small" style="color:#8cffb1;font-weight:bold">HARD MODE: harder patterns, same base speed</p>
<p id="wakeStatus" class="small" style="color:#ffd966">Screen lock: waiting for Start</p>
<button id="startBtn">Start</button>
</div></div>

<div id="pauseScreen" class="screen hidden"><div class="panel"><h1 id="pauseTitle">Pause</h1><p id="pauseText">Game is paused.</p><button id="resumeBtn">Resume</button></div></div>
<div id="over" class="screen hidden"><div class="panel"><h1 id="overTitle">Game over</h1><p><span id="finalScoreLabel">Score</span>: <b><span id="finalScore">0</span></b></p><p><span id="reachedLabel">Reached</span>: <b><span id="finalLevel">Level 1</span></b></p><button id="againBtn">Play again</button></div></div>

let audioCtx=null,audioOn=false;
function initAudio(){
  try{
    if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==="suspended") audioCtx.resume();
    audioOn=true;
  }catch(e){audioOn=false;}
}
function tone(freq=440,dur=0.08,type="sine",vol=0.055){
  if(!audioOn||!audioCtx)return;
  try{
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.type=type;
    o.frequency.setValueAtTime(freq,audioCtx.currentTime);
    g.gain.setValueAtTime(0.0001,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(vol,audioCtx.currentTime+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+dur);
    o.connect(g);g.connect(audioCtx.destination);
    o.start();o.stop(audioCtx.currentTime+dur+0.02);
  }catch(e){}
}
function sfx(kind){
  if(kind==="star"){tone(880,0.07,"sine",0.045);setTimeout(()=>tone(1175,0.07,"sine",0.035),45);}
  else if(kind==="hit"){tone(135,0.13,"sawtooth",0.075);setTimeout(()=>tone(90,0.12,"square",0.045),55);}
  else if(kind==="shield"){tone(520,0.08,"triangle",0.045);setTimeout(()=>tone(760,0.08,"triangle",0.04),55);}
  else if(kind==="bonus"){tone(660,0.08,"sine",0.045);setTimeout(()=>tone(880,0.08,"sine",0.045),70);setTimeout(()=>tone(1320,0.12,"sine",0.04),140);}
  else if(kind==="boss"){tone(180,0.16,"sawtooth",0.055);setTimeout(()=>tone(140,0.18,"sawtooth",0.055),100);}
  else if(kind==="bossHit"){tone(330,0.06,"square",0.045);setTimeout(()=>tone(220,0.06,"square",0.04),50);}
  else if(kind==="life"){tone(220,0.12,"triangle",0.05);setTimeout(()=>tone(440,0.12,"triangle",0.045),90);}
}

function togglePause(){if(!running)return;paused=!paused;if(!paused)startWake();$("pauseScreen").classList.toggle("hidden",!paused);$("pauseBtn").textContent=paused?"▶":"⏸"}

function damageShield(amount){sfx("hit");if(shield>0){shield=Math.max(0,shield-amount);addText(player.x,player.y-40,"-"+amount+" "+T.shield)}else{lives--;shield=Math.floor(maxShield*0.5);addText(player.x,player.y-40,"-"+T.lives,true);if(navigator.vibrate)navigator.vibrate([40,20,40]);if(lives<=0)gameOver()}}
function upgradeShield(){sfx("shield");maxShield+=5;shield=Math.min(maxShield,shield+25);addText(player.x,player.y-50,T.shieldUp,true)}

function hardLevelFactor(){
  return Math.min(1, level/30);
}
function shieldDamage(){
  return 20 + Math.floor(level/4)*5;
}
function spawnRockAt(xpos, extraVy=0, side=0){
  items.push({type:"rock",x:clamp(xpos,24*S,W-24*S),y:-35*S,r:15*S,vy:(1.9+level*.025+extraVy)*S,spin:rand(0,6.28),vx:side*S});
}
function spawnHardPattern(){
  const mode = level % 5;
  if(level>=4 && mode===0){
    spawnRockAt(W*.25,0.15,0.55);
    spawnRockAt(W*.75,0.15,-0.55);
  }else if(level>=7 && mode===1){
    spawnRockAt(W*.18,0.10,0.75);
    spawnRockAt(W*.50,0.05,0);
    spawnRockAt(W*.82,0.10,-0.75);
  }else if(level>=10 && mode===2){
    const gap = rand(W*.25,W*.75);
    spawnRockAt(gap-65*S,0.10,0);
    spawnRockAt(gap+65*S,0.10,0);
  }else if(level>=14 && mode===3){
    for(let i=0;i<4;i++) spawnRockAt(W*(.18+i*.21),0.06, i%2?-.55:.55);
  }else if(level>=18){
    for(let i=0;i<5;i++) spawnRockAt(W*(.12+i*.19),0.06, i%2?-.7:.7);
  }
}

function spawnStar(){
  let hazard = 0.34 + Math.min(.34, level*.012);
  let type = Math.random()<hazard ? "rock" : "star";
  if(level%3===0 && Math.random()<.10) type="rock";
  const side = (type==="rock" && level>=6) ? rand(-0.85,0.85) : 0;
  items.push({type,x:rand(28*S,W-28*S),y:-35*S,r:type==="star"?12*S:15*S,vy:(1.9+level*.02+rand(0,.45))*S,spin:rand(0,6.28),vx:side*S});
}
function spawnBox(){boxes.push({x:rand(38*S,W-38*S),y:-40*S,r:20*S,vy:2.1*S,spin:0})}
function activateBox(b){sfx("bonus");let r=Math.floor(Math.random()*3);if(r===0){items=items.filter(i=>i.type==="star");addText(b.x,b.y,T.clear,true)}else if(r===1){shield=maxShield;addText(b.x,b.y,T.shieldFull,true)}else{lives=3;addText(b.x,b.y,T.lifeFull,true)}boom(b.x,b.y,true)}

function playerShoot(){
  if(!boss)return;
  const count = Math.min(3, 1 + Math.floor(level/10));
  for(let i=0;i<count;i++){
    const off=(i-(count-1)/2)*10*S;
    playerShots.push({x:player.x+off,y:player.y-24*S,vy:-7.5*S,r:4*S});
  }
}
function bossShoot(){
  if(!boss)return;
  const aimed=(player.x-boss.x)/Math.max(90*S,Math.abs(player.x-boss.x));
  bossShots.push({x:boss.x,y:boss.y+boss.r*.8,vx:aimed*2.2*S,vy:(3.0+level*.025)*S,r:6*S});
  if(level>=10){
    bossShots.push({x:boss.x-boss.r*.55,y:boss.y+boss.r*.4,vx:-1.7*S,vy:(2.8+level*.02)*S,r:5*S});
    bossShots.push({x:boss.x+boss.r*.55,y:boss.y+boss.r*.4,vx:1.7*S,vy:(2.8+level*.02)*S,r:5*S});
  }
  if(level>=15){
    bossShots.push({x:boss.x,y:boss.y+boss.r*.6,vx:-2.6*S,vy:(2.6+level*.018)*S,r:5*S});
    bossShots.push({x:boss.x,y:boss.y+boss.r*.6,vx:2.6*S,vy:(2.6+level*.018)*S,r:5*S});
  }
  sfx("hit");
}

function startBoss(){sfx("boss");items=[];boxes=[];boss={x:W/2,y:100*S,r:34*S,hp:3,t:0};addText(W/2,H*.3,T.boss+" "+level,true);addText(W/2,H*.38,"AUTO FIRE",true)}
function beatBoss(){boss=null;if(level<30){level++;levelStart=score;nextLevelScore=score+100+level*25;shield=Math.min(maxShield,shield+50);addText(W/2,H*.3,T.levelUp+" "+level,true)}else{addText(W/2,H*.33,T.youWin,true);nextLevelScore=99999999}}
function bossSpawn(){if(!boss)return;boss.t++;boss.x=W/2+Math.sin(boss.t*.035)*W*.28;
if(boss.t%38===0)items.push({type:"attack",x:rand(34*S,W-34*S),y:-35*S,r:13*S,vy:(2.7+level*.03)*S,spin:0});
if(boss.t%29===0)items.push({type:"rock",x:rand(24*S,W-24*S),y:boss.y+20*S,r:15*S,vy:(2.3+level*.04)*S,spin:0});
if(boss.t%42===0)bossShoot();
if(boss.t%140<45)player.targetX+=(boss.x-player.targetX)*0.004;
}
function hitCircleRect(o){let rx=player.x-player.w*S/2,ry=player.y-player.h*S/2,rw=player.w*S,rh=player.h*S;let hx=clamp(o.x,rx,rx+rw),hy=clamp(o.y,ry,ry+rh),dx=o.x-hx,dy=o.y-hy;return dx*dx+dy*dy<o.r*o.r}
function collect(i){if(i.type==="star"){sfx("star");stars++;score+=5;boom(i.x,i.y,true);if(stars%5===0)upgradeShield();if(score>=nextBonus){spawnBox();nextBonus+=150}}else if(i.type==="attack"){if(boss){sfx("bossHit");boss.hp--;addText(i.x,i.y,T.hit+" "+boss.hp+"/3",true);boom(i.x,i.y,true);if(boss.hp<=0){sfx("bonus");beatBoss()}}score+=10}else damageShield(shieldDamage())}

function update(){if(!running||paused)return;if(hasTilt&&!touch)player.targetX=W/2+tilt*(W*.42);player.targetX=clamp(player.targetX,player.w*S/2,W-player.w*S/2);player.x+=clamp((player.targetX-player.x)*.20,-10*S,10*S);
if(!boss&&score>=nextLevelScore)startBoss();if(boss)bossSpawn();else{spawnT++;if(spawnT>Math.max(18,62-level)){spawnT=0;spawnStar()}}hardPatternT++;if(!boss&&hardPatternT>Math.max(95,170-level*2)){hardPatternT=0;spawnHardPattern();}
autoFireT++;
if(boss && autoFireT>16){autoFireT=0;playerShoot();}
for(const sh of playerShots){sh.y+=sh.vy;if(boss){let dx=sh.x-boss.x,dy=sh.y-boss.y;if(dx*dx+dy*dy<(boss.r+sh.r)*(boss.r+sh.r)){sh.dead=true;sfx("bossHit");boss.hp--;addText(sh.x,sh.y,T.hit+" "+boss.hp+"/3",true);boom(sh.x,sh.y,true);if(boss.hp<=0){sfx("bonus");beatBoss();}}}}
for(const bs of bossShots){bs.x+=bs.vx;bs.y+=bs.vy;if(!bs.dead&&hitCircleRect(bs)){bs.dead=true;damageShield(shieldDamage());boom(bs.x,bs.y,false);}}
for(const b of boxes){b.y+=b.vy;b.spin+=.08;if(!b.dead&&hitCircleRect(b)){b.dead=true;activateBox(b)}}
for(const i of items){i.y+=i.vy;if(i.vx)i.x+=i.vx;i.spin+=.06;if(!i.dead&&hitCircleRect(i)){i.dead=true;collect(i)}}
items=items.filter(i=>!i.dead&&i.y<H+70);boxes=boxes.filter(b=>!b.dead&&b.y<H+70);playerShots=playerShots.filter(s=>!s.dead&&s.y>-40);bossShots=bossShots.filter(s=>!s.dead&&s.y<H+70&&s.x>-60&&s.x<W+60);for(const q of parts){q.x+=q.vx;q.y+=q.vy;q.life--}parts=parts.filter(q=>q.life>0);for(const t of texts){t.y-=.25*S;t.life--}texts=texts.filter(t=>t.life>0);hud()}

function rr(a,b,w,h,r){x.beginPath();x.moveTo(a+r,b);x.lineTo(a+w-r,b);x.quadraticCurveTo(a+w,b,a+w,b+r);x.lineTo(a+w,b+h-r);x.quadraticCurveTo(a+w,b+h,a+w-r,b+h);x.lineTo(a+r,b+h);x.quadraticCurveTo(a,b+h,a,b+h-r);x.lineTo(a,b+r);x.quadraticCurveTo(a,b,a+r,b);x.closePath()}
function bg(){let g=x.createLinearGradient(0,0,0,H);g.addColorStop(0,"#1b3d5d");g.addColorStop(1,"#071018");x.fillStyle=g;x.fillRect(0,0,W,H);for(let i=0;i<36;i++){x.fillStyle=i%5?"rgba(255,255,255,.08)":"rgba(255,217,102,.18)";x.beginPath();x.arc((i*73+frame*.13)%W,60+(i*89)%Math.max(120,H-140),1.4+i%3,0,6.28);x.fill()}}
function star(px,py,r,rot,col="#ffd966"){x.save();x.translate(px,py);x.rotate(rot);x.shadowBlur=14*S;x.shadowColor=col;x.fillStyle=col;x.beginPath();for(let i=0;i<10;i++){let a=i*Math.PI/5-Math.PI/2,rr=i%2?r*.45:r;x.lineTo(Math.cos(a)*rr,Math.sin(a)*rr)}x.closePath();x.fill();x.restore()}
function rock(i){x.save();x.translate(i.x,i.y);x.rotate(i.spin);x.shadowBlur=10*S;x.shadowColor="#ff5d5d";x.fillStyle="#ff5d5d";x.beginPath();x.arc(0,0,i.r,0,6.28);x.fill();x.restore()}
function drawShip(){let w=player.w*S,h=player.h*S;x.save();x.translate(player.x,player.y);x.fillStyle="rgba(0,0,0,.35)";x.beginPath();x.ellipse(0,h*.62,w*.7,h*.22,0,0,6.28);x.fill();x.fillStyle=player.color;x.beginPath();x.moveTo(0,-h*.82);x.lineTo(w*.55,h*.35);x.lineTo(0,h*.12);x.lineTo(-w*.55,h*.35);x.closePath();x.fill();x.fillStyle="rgba(255,255,255,.55)";x.beginPath();x.arc(0,-h*.16,w*.12,0,6.28);x.fill();let bw=w*.9,bh=6*S,pct=shield/maxShield;x.fillStyle="rgba(0,0,0,.65)";x.fillRect(-bw/2,h*.82,bw,bh);x.fillStyle=pct>.5?"#8cffb1":pct>.25?"#ffd966":"#ff5d5d";x.fillRect(-bw/2,h*.82,bw*pct,bh);x.restore()}
function drawBoss(){if(!boss)return;x.save();x.translate(boss.x,boss.y);x.shadowBlur=18*S;x.shadowColor="#ff8cc6";x.fillStyle="#6b1b8f";x.beginPath();x.arc(0,0,boss.r,0,6.28);x.fill();x.fillStyle="#fff";x.font=`bold ${18*S}px Arial`;x.textAlign="center";x.textBaseline="middle";x.fillText("👾 "+boss.hp,0,0);x.restore()}
function draw(){x.clearRect(0,0,W,H);bg();drawBoss();for(const b of boxes){x.save();x.translate(b.x,b.y);x.rotate(b.spin);x.shadowBlur=18*S;x.shadowColor="#8fd7ff";x.fillStyle="#1e88e5";x.beginPath();x.arc(0,0,b.r,0,6.28);x.fill();x.fillStyle="#fff";x.font=`bold ${18*S}px Arial`;x.textAlign="center";x.textBaseline="middle";x.fillText("?",0,0);x.restore()}for(const i of items){if(i.type==="star")star(i.x,i.y,i.r,i.spin);else if(i.type==="attack")star(i.x,i.y,i.r,i.spin,"#8cffb1");else rock(i)}for(const sh of playerShots){x.fillStyle="#8cffb1";x.shadowBlur=8*S;x.shadowColor="#8cffb1";x.beginPath();x.arc(sh.x,sh.y,sh.r,0,6.28);x.fill();x.shadowBlur=0}
for(const bs of bossShots){x.fillStyle="#ff5d5d";x.shadowBlur=10*S;x.shadowColor="#ff5d5d";x.beginPath();x.arc(bs.x,bs.y,bs.r,0,6.28);x.fill();x.shadowBlur=0}
for(const q of parts){x.globalAlpha=q.life/24;x.fillStyle=q.g?"#ffd966":"#ff7a7a";x.beginPath();x.arc(q.x,q.y,q.r,0,6.28);x.fill();x.globalAlpha=1}drawShip();for(const t of texts){x.globalAlpha=Math.min(1,t.life/20);x.fillStyle=t.b?"#ffd966":"#fff";x.font=`bold ${(t.b?22:15)*S}px Arial`;x.textAlign="center";x.fillText(t.t,t.x,t.y);x.globalAlpha=1}}
function loop(){frame++;update();draw();requestAnimationFrame(loop)}
function ptr(e){let xx=e.clientX;if(e.touches&&e.touches[0])xx=e.touches[0].clientX;player.targetX=sx(xx)}
c.addEventListener("touchstart",e=>{e.preventDefault();touch=true;ptr(e)},{passive:false});c.addEventListener("touchmove",e=>{e.preventDefault();touch=true;ptr(e)},{passive:false});c.addEventListener("touchend",e=>{e.preventDefault();touch=false},{passive:false});
document.addEventListener("pointerdown",e=>{if(running&&!paused&&!e.target.closest(".screen")&&!e.target.closest("#pauseBtn")){touch=true;ptr(e)}});document.addEventListener("pointermove",e=>{if(touch&&running&&!paused)ptr(e)});document.addEventListener("pointerup",()=>touch=false);
addEventListener("deviceorientation",e=>{if(typeof e.gamma==="number"){tilt=clamp(e.gamma/28,-1,1);hasTilt=true}});
addEventListener("keydown",e=>{if(e.key==="ArrowLeft")player.targetX-=30*S;if(e.key==="ArrowRight")player.targetX+=30*S;if(e.key==="Escape")togglePause();if(e.key==="Enter"&&!running)start()});
$("startBtn").onclick=start;$("againBtn").onclick=start;$("pauseBtn").onclick=togglePause;$("resumeBtn").onclick=togglePause;if("serviceWorker"in navigator)addEventListener("load",()=>navigator.serviceWorker.register("service-worker.js").catch(()=>{}));hud();loop();
})();
</script>
</body>
</html>
